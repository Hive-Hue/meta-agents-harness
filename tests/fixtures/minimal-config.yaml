version: 1
name: "test-project"
description: "Test project description"

runtimes:
  pi:
    wrapper: "pimh"
    config_root: ".pi"
    config_pattern: ".pi/crew/<crew>/multi-team.yaml"
  claude:
    wrapper: "ccmh"
    config_root: ".claude"
    config_pattern: ".claude/crew/<crew>/multi-team.yaml"
  opencode:
    wrapper: "ocmh"
    config_root: ".opencode"
    config_pattern: ".opencode/crew/<crew>/multi-team.yaml"
  hermes:
    wrapper: "hermesh"
    config_root: ".hermes"
    config_pattern: ".hermes/crew/<crew>/config.yaml"

catalog:
  models:
    orchestrator_default: "zai/glm-4.7"
    lead_default: "zai/glm-4.7"
    worker_default: "zai/glm-5-turbo"
  domain_profiles:
    read_only_repo:
      - path: "."
        read: true
        edit: false
        bash: false

crews:
  - id: "test-crew"
    display_name: "Test Crew"
    mission: "Test mission for validation"
    source_configs:
      pi: ".pi/crew/test-crew/multi-team.yaml"
      claude: ".claude/crew/test-crew/multi-team.yaml"
      opencode: ".opencode/crew/test-crew/multi-team.yaml"
    session:
      pi_root: ".pi/crew/test-crew/sessions"
      claude_mirror_root: ".claude/crew/test-crew/sessions"
      hermes_root: ".hermes/crew/test-crew/sessions"
    topology:
      orchestrator: "orchestrator"
      leads:
        planning: "planning-lead"
      workers:
        planning:
          - "repo-analyst"
    agents:
      - id: "orchestrator"
        role: "orchestrator"
        team: "orchestration"
        model_ref: "orchestrator_default"
        expertise: "orchestrator-expertise-model"
        skills:
          - "delegate_bounded"
          - "zero_micromanagement"
          - "expertise_model"
        domain_profile: "read_only_repo"
      - id: "planning-lead"
        role: "lead"
        team: "planning"
        model_ref: "lead_default"
        expertise: "planning-lead-expertise-model"
        skills:
          - "delegate_bounded"
          - "zero_micromanagement"
          - "expertise_model"
        domain_profile: "read_only_repo"
      - id: "repo-analyst"
        role: "worker"
        team: "planning"
        model_ref: "worker_default"
        expertise: "repo-analyst-expertise-model"
        skills:
          - "expertise_model"
        domain_profile: "read_only_repo"
