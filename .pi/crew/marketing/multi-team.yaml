name: MarketingMultiTeam
session_dir: .pi/crew/marketing/sessions
expertise_dir: .pi/crew/marketing/expertise
orchestrator:
  name: orchestrator
  description: Orchestrator coordinator
  prompt: .pi/crew/marketing/agents/orchestrator.md
  expertise:
    path: .pi/crew/marketing/expertise/orchestrator-mental-model.yaml
    use-when: Track durable learnings for orchestrator.
    updatable: true
    max-lines: 10000
  model: zai/glm-4.7
  model_fallbacks:
    - zai/glm-5-turbo
    - zai/glm-4.5-air
  tools:
    - delegate_agent
    - update_mental_model
    - mcp_servers
    - mcp_tools
    - mcp_call
  skills:
    - .pi/skills/delegate-bounded/SKILL.md
    - .pi/skills/zero-micromanagement/SKILL.md
    - .pi/skills/mental-model/SKILL.md
  routes_to:
    - planning-lead
    - creative-lead
    - validation-lead
  domain:
    - path: .
      read: true
      upsert: false
      delete: false
