copywritings:
  - date: 2026-03-31
    note: "For launch-event social copy, keep channel differentiation explicit:
      LinkedIn should lead with business rationale and next-step CTAs; Instagram
      should feel visual and journey-driven with save/share prompts; X should
      stay terse and headline-like; short-form video should use colloquial
      backstage framing. Avoid broad claims beyond the documented launch/event
      presence and demo/conversation/WAITLIST actions."
  - date: 2026-03-31
    note: "Channel voice for launch social copy: LinkedIn = rationale/outcome + demo
      CTA; Instagram = visual/journey + save/share; X = terse/headline-like;
      short-form video = colloquial backstage framing. Keep claims limited to
      documented event presence, waitlist, demo, and conversation actions."
  - date: 2026-04-01
    note: "For technical editorial planning on agentic infrastructure, the strongest
      framing is practical systems design: lead with failure modes (unbounded
      delegation, weak ownership, no durable memory), then map problem →
      architecture → workflow → outcomes, and finish with assets that visualize
      routing boundaries and memory persistence."
  - date: 2026-04-01
    note: For technical editorial planning on agentic infrastructure, use problem →
      architecture → workflow → outcomes framing, and emphasize bounded
      delegation plus durable memory as the key differentiators.
  - date: 2026-04-01
    note: "For repo-evidence technical articles on agentic infrastructure, anchor
      the piece to three proof layers: per-crew topology YAML as source of
      truth, generated permission/task prompts as runtime evidence, and
      operational scripts (use/sync/validate/check) as the workflow backbone.
      Explicitly call out current per-crew source-of-truth paths instead of any
      legacy single-file framing."
  - date: 2026-04-01
    note: For repo-evidence technical articles on agentic infrastructure, anchor the
