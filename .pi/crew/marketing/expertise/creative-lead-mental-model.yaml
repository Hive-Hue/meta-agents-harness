campaign_narratives:
  - date: 2026-03-31
    note: For HiveHue pre-launch at Web Summit Rio, stronger campaign copy came from
      grounding every message in 'first public presentation / debut' and
      'qualified follow-up / next step' rather than abstract 'attention'
      language. Channel adaptation worked best when LinkedIn led with context
      and conversation, Instagram with journey/bastidores, X with short
      headline-style updates, and Reels/TikTok with casual behind-the-scenes
      framing.
