  - date: 2026-04-01
    note: For publication planning of technical repo articles, a primary owned
      canonical home (e.g. GitHub Pages/custom domain) usually beats
      social-native platforms on control, SEO, and reuse, while
      dev.to/LinkedIn/X work better as distribution layers. Official platform
      docs are best for confirming canonical-link, newsletter, and
      feature-gating constraints.
