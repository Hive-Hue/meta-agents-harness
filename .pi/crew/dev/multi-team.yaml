name: DevMultiTeam
session_dir: .pi/crew/dev/sessions
expertise_dir: .pi/crew/dev/expertise
orchestrator:
  name: orchestrator
  description: Orchestrator coordinator
  prompt: .pi/crew/dev/agents/orchestrator.md
  expertise:
    path: .pi/crew/dev/expertise/orchestrator-mental-model.yaml
    use-when: Track durable learnings for orchestrator.
    updatable: true
    max-lines: 10000
  model: zai/glm-4.7
  tools:
    - delegate_agent
    - update_mental_model
    - mcp_servers
    - mcp_tools
    - mcp_call
  skills:
    - .pi/skills/delegate-bounded/SKILL.md
    - .pi/skills/zero-micromanagement/SKILL.md
    - .pi/skills/mental-model/SKILL.md
  routes_to:
    - planning-lead
    - engineering-lead
    - validation-lead
  domain:
    - path: .
      read: true
      upsert: false
      delete: false
teams:
  - name: Planning
    lead:
      name: planning-lead
      description: Planning Lead planning lead
      prompt: .pi/crew/dev/agents/planning_lead.md
      expertise:
        path: .pi/crew/dev/expertise/planning-lead-mental-model.yaml
        use-when: Track durable learnings for planning-lead.
        updatable: true
        max-lines: 10000
      model: zai/glm-4.7
      tools:
        - delegate_agent
        - update_mental_model
        - mcp_servers
        - mcp_tools
        - mcp_call
      skills:
        - .pi/skills/delegate-bounded/SKILL.md
        - .pi/skills/zero-micromanagement/SKILL.md
        - .pi/skills/mental-model/SKILL.md
      routes_to:
        - repo-analyst
        - solution-architect
      domain:
        - path: .
          read: true
          upsert: false
          delete: false
    members:
      - name: repo-analyst
        description: Repo Analyst planning worker
        prompt: .pi/crew/dev/agents/repo_analyst.md
        expertise:
          path: .pi/crew/dev/expertise/repo-analyst-mental-model.yaml
          use-when: Track durable learnings for repo-analyst.
          updatable: true
          max-lines: 10000
        model: zai/glm-4.7
        tools:
          - read
          - grep
          - find
          - ls
          - update_mental_model
          - mcp_servers
          - mcp_tools
          - mcp_call
        skills:
          - .pi/skills/mental-model/SKILL.md
        domain:
          - path: .
            read: true
            upsert: false
            delete: false
      - name: solution-architect
        description: Solution Architect planning worker
        prompt: .pi/crew/dev/agents/solution_architect.md
        expertise:
          path: .pi/crew/dev/expertise/solution-architect-mental-model.yaml
          use-when: Track durable learnings for solution-architect.
          updatable: true
          max-lines: 10000
        model: zai/glm-4.7
        tools:
          - write
          - edit
          - read
          - grep
          - find
          - ls
          - update_mental_model
          - mcp_servers
          - mcp_tools
          - mcp_call
        skills:
          - .pi/skills/mental-model/SKILL.md
        domain:
          - path: .
            read: true
            upsert: false
            delete: false
          - path: specs/
            read: true
            upsert: true
            delete: false
