rules:
  - id: "deploy-warning"
    description: "Warn when a deployment command appears in bash input"
    event: tool_call
    tool: bash
    commandIncludes:
      - "deploy"
    severity: warning
    message: "Deploy command detected. Confirm target environment before proceeding."
    throttleSeconds: 60
    tags: ["ops", "release"]

  - id: "env-edit-critical"
    description: "Raise critical alert when editing secrets/env files"
    event: tool_call
    tool: ["write", "edit"]
    pathIncludes:
      - ".env"
    severity: critical
    message: "Sensitive environment file edit detected. Validate secret handling."
    alertOnce: true
    tags: ["security", "secrets"]

  - id: "mass-delete-watch"
    description: "Warn about potentially destructive recursive deletes"
    event: tool_call
    tool: bash
    commandRegex: "\\brm\\s+-rf?\\b"
    severity: warning
    message: "Potentially destructive delete detected (rm -r/-rf)."
    throttleSeconds: 30
    tags: ["safety"]
