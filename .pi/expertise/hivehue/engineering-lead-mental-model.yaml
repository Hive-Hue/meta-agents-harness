patterns:
  - date: "2026-03-30"
    note: "Route UI work to frontend-dev and service, persistence, or auth work to backend-dev."
  - date: "2026-03-30"
    note: "Use narrow, verifiable delegations for runtime validation before assigning larger implementation slices."
workflows:
  - date: "2026-03-30"
    note: "Sequence backend contract work before frontend integration when API behavior changes."
  - date: "2026-03-30"
    note: "Ask for evidence in the same turn: concrete tool calls, exact outputs, and file-level confirmation when delegating verification tasks."
  - date: "2026-03-31"
    note: "When UI work depends on Figma, pre-process the Figma URL through the local Codex CLI sidecar before delegating to frontend-dev, then pass the extracted layout/component notes in the delegation."
  - date: "2026-03-31"
    note: "Prefer one bounded delegation per owner that combines diagnosis, fix, and verification; repeated micro-delegations for the same owner add major runtime overhead."
  - date: "2026-03-30"
    note: "Auth implementation completed: backend has full auth endpoints (signup/login/logout/me) with JWT filter and cookie-based sessions; frontend integrated with cookie-based auth, removed localStorage, wired signup/signin pages. Backend compiles but runtime verification blocked by environment constraints (no long-running process support). Frontend passes lint."
  - date: "2026-03-31"
    note: "Figma validation workflow: 1) Use frontend-dev (has read scope to root) to run codex mcp list + codex exec --skip-git-repo-check, 2) Extract design context via figma MCP, 3) Then delegate implementation to frontend-dev with extracted details. Backend-dev blocked by scope restrictions on .pi and /tmp paths."
risks:
  - date: "2026-03-30"
    note: "Cross-cutting auth work can regress quickly if frontend expectations and backend contracts drift."
  - date: "2026-03-30"
    note: "Backend currently has partial auth artifacts without a complete JWT dependency and configuration setup."
  - date: "2026-03-30"
    note: "Backend runtime verification requires external process orchestration (start app in one session, curl in another). Worker tools cannot maintain long-running Spring Boot processes across sequential commands. Recommend manual verification or scripted start-test-stop approach for future auth work."
tools:
  - date: "2026-03-30"
    note: "Worker session reuse was the main source of empty replies; the harness now avoids resuming prior worker sessions and marks empty no-tool turns as failures."
  - date: "2026-03-30"
    note: "Both frontend-dev and backend-dev were revalidated successfully after the harness fix with concrete create/read/delete evidence."
  - date: "2026-03-31"
    note: "Figma MCP should be accessed indirectly through the local Codex CLI sidecar; use .pi/skills/figma-via-codex/scripts/figma_codex_extract.sh instead of trying to make Pi workers access Figma directly."
  - date: "2026-03-31"
    note: "Lead session resume also adds latency and drift; child delegations now start fresh and rely on expertise files for durable context."
decisions:
  - date: "2026-03-30"
    note: "Use new root sessions without -c for clean runtime validation, and reserve -c for intentionally continuing the root orchestrator conversation."
lessons:
  - date: "2026-03-30"
    note: "Expertise quality degrades when prompt and response fragments are auto-saved verbatim; keep only durable patterns, risks, workflows, and factual state."
  - date: "2026-03-31"
    note: "TypeScript strict mode catches implicit any in event handlers. Always use explicit types: FormEvent<HTMLFormElement> for onSubmit, ChangeEvent<HTMLInputElement> for onChange. When auth context API changes (e.g., loading vs isLoading), grep all consumers to ensure consistency."
observations:
  - date: "2026-03-30"
    note: "HiveHue runtime config now targets real paths: hivehue-app-frontend/ and hivehue-app-backend/."
  - date: "2026-03-30"
    note: "Backend app-core remains the main delivery surface for auth work; frontend already has a mock auth path in src/lib/api/auth.ts and AuthContext."
