patterns:
  - date: "2026-03-30"
    note: "Run QA and security review for any meaningful frontend or backend change, especially contract or auth work."
  - date: "2026-03-30"
    note: "HiveHue validation scope covers 10 user journey stages with a heavy concentration of risk around auth, onboarding, community actions, events, services, and programs."
  - date: "2026-03-30"
    note: "Login/signup validation revealed critical auth gaps: cookies without secure flag, no refresh token rotation, missing rate limiting, and unvalidated JWT secret. Backend implements JWT with cookies but production security is incomplete. Frontend has complete auth flows but server-side validation gaps exist."
  - date: "2026-03-31"
    note: "Frontend build validation requires direct command execution evidence (npm run build, npm run lint output). QA reviewer completed task but returned minimal output format - may need more explicit output requirements in delegation."
  - date: "2026-03-31"
    note: "Frontend build validation completed with concrete evidence: npm run build PASS (8.2s, 10 pages), npm run lint PASS (zero warnings/errors). QA reviewer provided full command output when given explicit mandatory output format requirements."
  - date: "2026-03-31"
    note: "Password reset validation reveals 4 critical security areas: token handling (entropy, single-use, expiration), error messaging (enumeration prevention, timing attacks), rate limiting (per-IP, per-email, global), UX security (clickjacking, open redirects). NIST 800-63B and OWASP ASVS v4.0.3 provide comprehensive compliance requirements."
workflows:
  - date: "2026-03-30"
    note: "Use qa-reviewer for correctness, regression coverage, and missing tests; use security-reviewer for blast radius, trust boundaries, and unsafe defaults."
  - date: "2026-03-30"
    note: "Read journey docs and current implementation status before delegating, then aggregate findings into a single prioritized validation view."
  - date: "2026-03-31"
    note: "Default to one evidence-heavy validation round instead of a soft first pass plus a stricter retry; explicit output requirements save minutes of rework."
  - date: "2026-03-31"
    note: "Password reset UX security requires balancing 15 requirements: generic messages, constant-time responses, accessibility (WCAG 2.1 AA), regression testing with existing auth flows. 25 edge cases across token lifecycle, email handling, network failures, password validation, concurrent operations."
risks:
  - date: "2026-03-30"
    note: "Login remains a critical gap because frontend auth is mocked while backend auth is permissive and incomplete."
  - date: "2026-03-30"
    note: "Contract changes between frontend and backend require explicit validation coverage to avoid false confidence from isolated smoke checks."
  - date: "2026-03-30"
    note: "Critical validation priorities for HiveHue auth: 1) Secure cookie flags must be environment-conditional, 2) Refresh token rotation is missing and creates 7-day persistent attack window, 3) Rate limiting on auth endpoints is absent, 4) JWT secret validation at startup is needed."
  - date: "2026-03-31"
    note: "Password reset planning identified 6 critical severity risks: insufficient token entropy, insecure transmission, single-use enforcement failure, timing attacks, account enumeration via differential messages, missing rate limiting. Must-have requirements: 32-byte SecureRandom tokens, 1-4 hour expiration, constant-time comparison, generic success messages, per-IP/per-email rate limits."
tools:
