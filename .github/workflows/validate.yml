name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install OpenCode runtime dependencies
        run: (cd .opencode && npm install)

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Run runtime contract tests
        run: npm run test:contract

      - name: Run plugin system tests
        run: npm run test:plugins

      - name: Run diagnostics and platform reliability tests
        run: npm run test:diagnostics

      - name: Validate canonical config
        run: npm run validate:config

      - name: Validate canonical sync drift
        run: npm run check:meta-sync
