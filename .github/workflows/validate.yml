name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install OpenCode runtime dependencies
        run: (cd .opencode && npm install)

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Validate runtime
        run: npm run validate
