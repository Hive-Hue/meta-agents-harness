version: 1
name: marketing-multi-team-harness
runtime:
  harness: opencode
  source_of_truth: meta-agents.yaml
  source_crew: marketing
  validation_command: npm --prefix .opencode run validate:multi-team
shared:
  skills:
    - path: .opencode/skills/delegate-bounded/SKILL.md
      use-when: Use when relevant to current task.
    - path: .opencode/skills/zero-micromanagement/SKILL.md
      use-when: Use when relevant to current task.
    - path: .opencode/skills/mental-model/SKILL.md
      use-when: Use when relevant to current task.
  tools:
    - update-mental-model
  mcp:
    - clickup
    - github
    - context7
orchestrator:
  id: orchestrator
  role: ceo
  model: zai/glm-4.7
  agent_file: .opencode/crew/marketing/agents/orchestrator.md
  expertise:
    path: .opencode/crew/marketing/expertise/orchestrator-mental-model.yaml
    use-when: Track durable learnings for orchestrator.
  skills:
    - path: .opencode/skills/delegate-bounded/SKILL.md
      use-when: Use when relevant to current task.
    - path: .opencode/skills/zero-micromanagement/SKILL.md
      use-when: Use when relevant to current task.
    - path: .opencode/skills/mental-model/SKILL.md
      use-when: Use when relevant to current task.
  tools:
    - task
    - update-mental-model
  mcp_access:
    - clickup
    - github
    - context7
  routes_to:
    - planning-lead
    - creative-lead
    - validation-lead
  domain:
    - path: .
      read: true
      edit: false
      bash: false
teams:
  - name: Planning
    lead:
