      mcp_access:
        - clickup
        - github
        - context7
      routes_to:
        - market-researcher
        - campaign-strategist
      domain:
        - path: .
          read: true
          edit: false
          bash: false
        - path: campaigns/
          read: true
          edit: true
          bash: false
        - path: assets/
          read: true
          edit: true
          bash: false
