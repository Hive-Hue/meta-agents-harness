version: 1
name: opencode-multi-team-harness
description: >
  Canonical high-level topology for a multi-team harness in OpenCode.
  Use this as source-of-truth and keep `.opencode/agents/*.md` aligned.

runtime:
  harness: opencode
  source_of_truth: .opencode/multi-team.yaml
  validation_command: npm --prefix .opencode run validate:multi-team

shared:
  skills:
    - path: .opencode/skills/delegate-bounded/SKILL.md
      use_when: Delegate one bounded outcome to a lead or worker.
    - path: .opencode/skills/zero-micromanagement/SKILL.md
      use_when: Assign outcomes and constraints without prescribing keystrokes.
    - path: .opencode/skills/mental-model/SKILL.md
      use_when: Read/update durable expertise before/after meaningful work.
  tools:
    - update-mental-model
  mcp:
    - clickup
    - github
    - context7

orchestrator:
  id: orchestrator
  role: ceo
  model: openai/gpt-5.2
  agent_file: .opencode/agents/orchestrator.md
  expertise:
    path: .opencode/expertise/orchestrator-mental-model.yaml
    use_when: Capture global coordination patterns, bottlenecks, and routing decisions.
  skills:
    - path: .opencode/skills/delegate-bounded/SKILL.md
      use_when: Always, before every Task delegation.
    - path: .opencode/skills/zero-micromanagement/SKILL.md
      use_when: Always, for lead handoffs.
    - path: .opencode/skills/mental-model/SKILL.md
      use_when: At task boundaries (start/end) to preserve durable learnings.
  tools:
    - task
    - update-mental-model
  mcp_access:
    - clickup
    - github
    - context7
  routes_to:
    - planning-lead
    - engineering-lead
    - validation-lead
  domain:
    - path: .
      read: true
      edit: false
      bash: false

teams:
  - name: Planning
    lead:
      id: planning-lead
      role: lead
      model: openai/gpt-5.2
      agent_file: .opencode/agents/planning-lead.md
      expertise:
        path: .opencode/expertise/planning-lead-mental-model.yaml
        use_when: Record planning quality signals, assumptions, and scoping heuristics.
      skills:
        - path: .opencode/skills/delegate-bounded/SKILL.md
          use_when: For every worker assignment.
        - path: .opencode/skills/zero-micromanagement/SKILL.md
          use_when: While framing worker tasks.
        - path: .opencode/skills/mental-model/SKILL.md
          use_when: Start/end of planning cycles.
      tools:
        - task
        - update-mental-model
      mcp_access:
        - clickup
        - github
        - context7
      routes_to:
        - repo-analyst
        - solution-architect
      domain:
        - path: .
          read: true
          edit: false
          bash: false
    members:
      - id: repo-analyst
        role: worker
        model: openai/gpt-5.2-mini
        agent_file: .opencode/agents/repo-analyst.md
        expertise:
          path: .opencode/expertise/repo-analyst-mental-model.yaml
          use_when: Capture stable codebase maps, risks, and dependency hotspots.
        skills:
          - path: .opencode/skills/mental-model/SKILL.md
            use_when: Before/after repository analysis tasks.
        tools:
          - read
          - grep
          - glob
          - list
          - update-mental-model
        mcp_access:
          - github
          - context7
        domain:
          - path: .
            read: true
            edit: false
            bash: false
      - id: solution-architect
        role: worker
        model: openai/gpt-5.2
        agent_file: .opencode/agents/solution-architect.md
        expertise:
          path: .opencode/expertise/solution-architect-mental-model.yaml
          use_when: Store architecture tradeoffs, sequencing patterns, and handoff quality notes.
        skills:
          - path: .opencode/skills/mental-model/SKILL.md
            use_when: Before drafting plans and after architecture decisions.
        tools:
          - read
          - grep
          - glob
          - list
          - edit
          - update-mental-model
        mcp_access:
          - github
          - context7
          - clickup
        domain:
          - path: .
            read: true
            edit: false
            bash: false
          - path: specs/
            read: true
            edit: true
            bash: false

  - name: Engineering
    lead:
      id: engineering-lead
      role: lead
      model: openai/gpt-5.2
      agent_file: .opencode/agents/engineering-lead.md
      expertise:
        path: .opencode/expertise/engineering-lead-mental-model.yaml
        use_when: Track implementation risks, quality gates, and worker strengths.
      skills:
        - path: .opencode/skills/delegate-bounded/SKILL.md
          use_when: For each frontend/backend split.
        - path: .opencode/skills/zero-micromanagement/SKILL.md
          use_when: Always while assigning implementation scope.
        - path: .opencode/skills/mental-model/SKILL.md
          use_when: Before/after implementation rounds.
      tools:
        - task
        - update-mental-model
      mcp_access:
        - github
        - context7
        - clickup
      routes_to:
        - frontend-dev
        - backend-dev
      domain:
        - path: .
          read: true
          edit: false
          bash: false
    members:
      - id: frontend-dev
        role: worker
        model: openai/gpt-5.2-mini
        agent_file: .opencode/agents/frontend-dev.md
        expertise:
          path: .opencode/expertise/frontend-dev-mental-model.yaml
          use_when: Save reusable UI patterns, pitfalls, and verification checks.
        skills:
          - path: .opencode/skills/mental-model/SKILL.md
            use_when: Before and after frontend implementation.
        tools:
          - read
          - grep
          - glob
          - list
          - edit
          - bash
          - update-mental-model
        mcp_access:
          - github
          - context7
        domain:
          - path: .
            read: true
            edit: false
            bash: false
          - path: src/frontend/
            read: true
            edit: true
            bash: true
          - path: web/
            read: true
            edit: true
            bash: true
      - id: backend-dev
        role: worker
        model: openai/gpt-5.2-mini
        agent_file: .opencode/agents/backend-dev.md
        expertise:
          path: .opencode/expertise/backend-dev-mental-model.yaml
          use_when: Persist backend patterns, API decisions, and runtime caveats.
        skills:
          - path: .opencode/skills/mental-model/SKILL.md
            use_when: Before and after backend implementation.
        tools:
          - read
          - grep
          - glob
          - list
          - edit
          - bash
          - update-mental-model
        mcp_access:
          - github
          - context7
        domain:
          - path: .
            read: true
            edit: false
            bash: false
          - path: src/backend/
            read: true
            edit: true
            bash: true
          - path: api/
            read: true
            edit: true
            bash: true

  - name: Validation
    lead:
      id: validation-lead
      role: lead
      model: openai/gpt-5.2
      agent_file: .opencode/agents/validation-lead.md
      expertise:
        path: .opencode/expertise/validation-lead-mental-model.yaml
        use_when: Track regression patterns, security hotspots, and release risk posture.
      skills:
        - path: .opencode/skills/delegate-bounded/SKILL.md
          use_when: For QA/security test and review task splitting.
        - path: .opencode/skills/zero-micromanagement/SKILL.md
          use_when: While defining validation acceptance criteria.
        - path: .opencode/skills/mental-model/SKILL.md
          use_when: Start/end of validation rounds.
      tools:
        - task
        - update-mental-model
      mcp_access:
        - github
        - context7
        - clickup
      routes_to:
        - qa-reviewer
        - security-reviewer
      domain:
        - path: .
          read: true
          edit: false
          bash: false
    members:
      - id: qa-reviewer
        role: worker
        model: openai/gpt-5.2-mini
        agent_file: .opencode/agents/qa-reviewer.md
        expertise:
          path: .opencode/expertise/qa-reviewer-mental-model.yaml
          use_when: Save regression signatures and practical test coverage gaps.
        skills:
          - path: .opencode/skills/mental-model/SKILL.md
            use_when: Before/after QA rounds.
        tools:
          - read
          - grep
          - glob
          - list
          - bash
          - update-mental-model
        mcp_access:
          - github
          - context7
        domain:
          - path: .
            read: true
            edit: false
            bash: true
      - id: security-reviewer
        role: worker
        model: openai/gpt-5.2-mini
        agent_file: .opencode/agents/security-reviewer.md
        expertise:
          path: .opencode/expertise/security-reviewer-mental-model.yaml
          use_when: Store recurring security findings and mitigations.
        skills:
          - path: .opencode/skills/mental-model/SKILL.md
            use_when: Before/after security review.
        tools:
          - read
          - grep
          - glob
          - list
          - bash
          - update-mental-model
        mcp_access:
          - github
          - context7
        domain:
          - path: .
            read: true
            edit: false
            bash: true
