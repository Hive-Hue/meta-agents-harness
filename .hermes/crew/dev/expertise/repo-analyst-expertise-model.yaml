patterns:
  - date: "2026-04-18"
    note: "Kilo runtime model resolution bug: buildKiloRunConfig in mah-plugins/kilo/index.mjs line 241 uses `orchestratorModel || agent.source.model` for non-orchestrator agents. Since orchestratorModel is always truthy (minimax/minimax-m2.7), ALL subagents get the orchestrator model instead of their own. The fix is to swap to `agent.source.model || orchestratorModel`. Also: no qa_default override in kilo model_overrides (meta-agents.yaml line 31-34), so qa-reviewer/security-reviewer get zai/glm-5 (normalized catalog default) instead of zai/glm-5.1."
  - date: "2026-04-18"
    note: "Claude CCR runtime has two execution paths: (1) MAH plugin path via mah-plugins/claude/index.mjs which runs `claude --append-system-prompt ... --agents {...}` directly — no CCR dependency, no model routing, just passes all agents to Claude CLI. (2) Legacy CCR path via .claude/scripts/run-crew-claude.mjs (ccmh run) which requires `ccr` binary installed, calls `ccr activate` for env vars, and uses custom-router.cjs for model routing via route-map at ~/.claude-code-router/. The MAH path does NOT use CCR at all — if user runs `mah --runtime claude run`, it invokes `claude` directly with --append-system-prompt and --agents. CCR router is only used when running via `ccmh run`."
  - date: "2026-04-18"
    note: "CCR (Claude Code Router) infrastructure has been removed from the repo: .claude/ccr/ (custom-router.cjs, route-map.example.json), .claude/scripts/ (run-crew-claude.mjs, install-ccr-router.mjs, sync-ccr-route-map.mjs, doctor.mjs, validate-ccr-route-map.mjs), .claude/bin/ccmh, .claude/settings.json, .claude/package.json — all gone. Only .claude/.active-crew.json and .claude/crew/dev/ remain. The MAH plugin path (mah-plugins/claude/index.mjs) is the sole execution path now, invoking `claude code --append-system-prompt ... --agents {...}` directly with no CCR dependency, no MULTI-ROUTE tag injection, and no model routing. The custom-router.cjs and route-map artifacts from previous sessions were likely in a different working tree state or have been cleaned up."
