version: 1
name: meta-agents-harness
description: Unified multi-runtime harness for OpenCode, Claude Code, and PI.
runtime_detection:
  order:
    - forced
    - marker
    - cli
  forced:
    args:
      - "--runtime=<name>"
      - "--runtime <name>"
    env:
      - MAH_RUNTIME
  marker:
    pi: ".pi"
    claude: ".claude"
    opencode: ".opencode"
  cli:
    pi:
      direct_cli: "pi"
      wrapper: "pimh"
    claude:
      direct_cli: "claude"
      wrapper: "ccmh"
    opencode:
      direct_cli: "opencode"
      wrapper: "ocmh"
runtimes:
  pi:
    wrapper: "pimh"
    config_root: ".pi"
    extension_root: "extensions"
  claude:
    wrapper: "ccmh"
    config_root: ".claude"
  opencode:
    wrapper: "ocmh"
    config_root: ".opencode"
