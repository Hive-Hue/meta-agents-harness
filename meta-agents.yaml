version: 1
name: "meta-agents-harness"
description: "Unified source-of-truth for crews, roles, skills, expertise, models, domains, and runtime projections."

runtime_detection:
  order:
    - forced
    - marker
    - cli
  forced:
    args:
      - "--runtime=<name>"
      - "--runtime <name>"
      - "-r <name>"
      - "-f <name>"
    env:
      - MAH_RUNTIME
  marker:
    pi: ".pi"
    claude: ".claude"
    opencode: ".opencode"
  cli:
    pi:
      direct_cli: "pi"
      wrapper: "pimh"
    claude:
      direct_cli: "claude"
      wrapper: "ccmh"
    opencode:
      direct_cli: "opencode"
      wrapper: "ocmh"

runtimes:
  pi:
    wrapper: "pimh"
    config_root: ".pi"
    extension_root: "extensions"
    config_pattern: ".pi/crew/<crew>/multi-team.yaml"
    default_extensions:
      - "extensions/multi-team.ts"
      - "extensions/agent-session-navigator.ts"
      - "extensions/mcp-bridge.ts"
      - "extensions/theme-cycler.ts"
  claude:
    wrapper: "ccmh"
    config_root: ".claude"
    config_pattern: ".claude/crew/<crew>/multi-team.yaml"
    ccr:
      route_map: ".claude/ccr/route-map.example.json"
      policy: "bounded"
    mcp:
      config: ".mcp.json"
      template: ".mcp.example.json"
  opencode:
    wrapper: "ocmh"
    config_root: ".opencode"
    config_pattern: ".opencode/crew/<crew>/multi-team.yaml"
    task_policy: "permission.task"
    model_overrides:
      orchestrator_default: "zai/glm-4.7"
      lead_default: "zai/glm-4.7"
      worker_default: "zai/glm-4.7"

catalog:
  models:
    orchestrator_default: "zai/glm-4.7"
    lead_default: "openrouter/nvidia/nemotron-3-super-120b-a12b:free"
    worker_default: "zai/glm-5-turbo"
  model_fallbacks:
    orchestrator_default:
      - "zai/glm-5-turbo"
      - "zai/glm-4.5-air"
    lead_default:
      - "zai/glm-5-turbo"
      - "zai/glm-4.5-air"
    worker_default:
      - "zai/glm-4.7"
      - "zai/glm-4.5-air"
  skills:
    delegate_bounded:
      opencode: ".opencode/skills/delegate-bounded/SKILL.md"
      claude: ".claude/skills/delegate-bounded/SKILL.md"
      pi: ".pi/skills/delegate-bounded/SKILL.md"
    zero_micromanagement:
      opencode: ".opencode/skills/zero-micromanagement/SKILL.md"
      claude: ".claude/skills/zero-micromanagement/SKILL.md"
      pi: ".pi/skills/zero-micromanagement/SKILL.md"
    mental_model:
      opencode: ".opencode/skills/mental-model/SKILL.md"
      claude: ".claude/skills/mental-model/SKILL.md"
      pi: ".pi/skills/mental-model/SKILL.md"
  domain_profiles:
    read_only_repo:
      - path: "."
        read: true
        edit: false
        bash: false
    specs_writer:
      - path: "."
        read: true
        edit: false
        bash: false
      - path: "specs/"
        read: true
        edit: true
        bash: false
    frontend_impl:
      - path: "."
        read: true
        edit: false
        bash: false
      - path: "src/frontend/"
        read: true
        edit: true
        bash: true
      - path: "web/"
        read: true
        edit: true
        bash: true
    backend_impl:
      - path: "."
        read: true
        edit: false
        bash: false
      - path: "src/backend/"
        read: true
        edit: true
        bash: true
      - path: "api/"
        read: true
        edit: true
        bash: true
    qa_security:
      - path: "."
        read: true
        edit: false
        bash: true
    marketing_assets:
      - path: "."
        read: true
        edit: false
        bash: false
      - path: "campaigns/"
        read: true
        edit: true
        bash: false
      - path: "assets/"
        read: true
        edit: true
        bash: false

crews:
  - id: "dev"
    display_name: "Development Crew"
    source_configs:
      pi: ".pi/crew/dev/multi-team.yaml"
      claude: ".claude/crew/dev/multi-team.yaml"
      opencode: ".opencode/multi-team.yaml"
    session:
      pi_root: ".pi/crew/dev/sessions"
      claude_mirror_root: ".claude/crew/dev/sessions"
    topology:
      orchestrator: "orchestrator"
      leads:
        planning: "planning-lead"
        engineering: "engineering-lead"
        validation: "validation-lead"
      workers:
        planning: ["repo-analyst", "solution-architect"]
        engineering: ["frontend-dev", "backend-dev"]
        validation: ["qa-reviewer", "security-reviewer"]
    agents:
      - id: "orchestrator"
        role: "orchestrator"
        team: "orchestration"
        model_ref: "orchestrator_default"
        expertise: "orchestrator-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "read_only_repo"
      - id: "planning-lead"
        role: "lead"
        team: "planning"
        model_ref: "lead_default"
        expertise: "planning-lead-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "read_only_repo"
      - id: "engineering-lead"
        role: "lead"
        team: "engineering"
        model_ref: "lead_default"
        expertise: "engineering-lead-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "read_only_repo"
      - id: "validation-lead"
        role: "lead"
        team: "validation"
        model_ref: "lead_default"
        expertise: "validation-lead-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "read_only_repo"
      - id: "repo-analyst"
        role: "worker"
        team: "planning"
        model_ref: "worker_default"
        expertise: "repo-analyst-mental-model"
        skills: ["mental_model"]
        domain_profile: "read_only_repo"
      - id: "solution-architect"
        role: "worker"
        team: "planning"
        model_ref: "lead_default"
        expertise: "solution-architect-mental-model"
        skills: ["mental_model"]
        domain_profile: "specs_writer"
      - id: "frontend-dev"
        role: "worker"
        team: "engineering"
        model_ref: "worker_default"
        expertise: "frontend-dev-mental-model"
        skills: ["mental_model"]
        domain_profile: "frontend_impl"
      - id: "backend-dev"
        role: "worker"
        team: "engineering"
        model_ref: "worker_default"
        expertise: "backend-dev-mental-model"
        skills: ["mental_model"]
        domain_profile: "backend_impl"
      - id: "qa-reviewer"
        role: "worker"
        team: "validation"
        model_ref: "worker_default"
        expertise: "qa-reviewer-mental-model"
        skills: ["mental_model"]
        domain_profile: "qa_security"
      - id: "security-reviewer"
        role: "worker"
        team: "validation"
        model_ref: "worker_default"
        expertise: "security-reviewer-mental-model"
        skills: ["mental_model"]
        domain_profile: "qa_security"
    runtime_overrides:
      opencode:
        permission:
          task:
            allow_delegate:
              orchestrator: ["planning-lead", "engineering-lead", "validation-lead"]
              planning-lead: ["repo-analyst", "solution-architect"]
              engineering-lead: ["frontend-dev", "backend-dev"]
              validation-lead: ["qa-reviewer", "security-reviewer"]
      claude:
        ccr:
          team_routes:
            orchestrator: ["planning-lead", "engineering-lead", "validation-lead"]
      pi:
        multi_team:
          session_root: ".pi/crew/dev/sessions"
          extension_entry: "extensions/multi-team.ts"

  - id: "marketing"
    display_name: "Marketing Crew"
    source_configs:
      pi: ".pi/crew/marketing/multi-team.yaml"
      claude: ".claude/crew/marketing/multi-team.yaml"
      opencode: ".opencode/multi-team.yaml"
    session:
      pi_root: ".pi/crew/marketing/sessions"
      claude_mirror_root: ".claude/crew/marketing/sessions"
    topology:
      orchestrator: "orchestrator"
      leads:
        planning: "planning-lead"
        creative: "creative-lead"
        validation: "validation-lead"
      workers:
        planning: ["market-researcher", "campaign-strategist"]
        creative: ["copywriter", "creative-strategist", "media-operator"]
        validation: ["performance-analyst", "brand-safety-reviewer"]
    agents:
      - id: "orchestrator"
        role: "orchestrator"
        team: "orchestration"
        model_ref: "orchestrator_default"
        expertise: "orchestrator-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "read_only_repo"
      - id: "planning-lead"
        role: "lead"
        team: "planning"
        model_ref: "lead_default"
        expertise: "planning-lead-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "marketing_assets"
      - id: "creative-lead"
        role: "lead"
        team: "creative"
        model_ref: "lead_default"
        expertise: "creative-lead-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "marketing_assets"
      - id: "validation-lead"
        role: "lead"
        team: "validation"
        model_ref: "lead_default"
        expertise: "validation-lead-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "marketing_assets"
      - id: "market-researcher"
        role: "worker"
        team: "planning"
        model_ref: "worker_default"
        expertise: "market-researcher-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "campaign-strategist"
        role: "worker"
        team: "planning"
        model_ref: "worker_default"
        expertise: "campaign-strategist-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "copywriter"
        role: "worker"
        team: "creative"
        model_ref: "worker_default"
        expertise: "copywriter-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "creative-strategist"
        role: "worker"
        team: "creative"
        model_ref: "worker_default"
        expertise: "creative-strategist-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "media-operator"
        role: "worker"
        team: "creative"
        model_ref: "worker_default"
        expertise: "media-operator-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "performance-analyst"
        role: "worker"
        team: "validation"
        model_ref: "worker_default"
        expertise: "performance-analyst-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "brand-safety-reviewer"
        role: "worker"
        team: "validation"
        model_ref: "worker_default"
        expertise: "brand-safety-reviewer-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
    runtime_overrides:
      opencode:
        permission:
          task:
            allow_delegate:
              orchestrator: ["planning-lead", "creative-lead", "validation-lead"]
              planning-lead: ["market-researcher", "campaign-strategist"]
              creative-lead: ["copywriter", "creative-strategist", "media-operator"]
              validation-lead: ["performance-analyst", "brand-safety-reviewer"]
      claude:
        ccr:
          team_routes:
            orchestrator: ["planning-lead", "creative-lead", "validation-lead"]
      pi:
        multi_team:
          session_root: ".pi/crew/marketing/sessions"
          extension_entry: "extensions/multi-team.ts"

adapters:
  source_of_truth: "meta-agents.yaml"
  mapping_rules:
    roles_to_runtime:
      opencode: "agent files + permission.task"
      claude: "agent files + CCR route map + .mcp.json"
      pi: "crew multi-team.yaml + extensions/multi-team.ts"
    expertise_to_runtime:
      opencode: ".opencode/crew/<crew>/expertise/<agent>-mental-model.yaml"
      claude: ".claude/crew/<crew>/expertise/<agent>-mental-model.yaml"
      pi: ".pi/crew/<crew>/expertise/<agent>-mental-model.yaml"
    skills_to_runtime:
      opencode: ".opencode/skills/*/SKILL.md"
      claude: ".claude/skills/*/SKILL.md"
      pi: ".pi/skills/*/SKILL.md"
    domain_to_runtime:
      opencode: "permission.read/edit/bash"
      claude: "tool + routing scope"
      pi: "domain.read/upsert/delete + session scope"
