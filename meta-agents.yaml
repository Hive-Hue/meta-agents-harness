crews:
  - id: "bootstrap-config"
    display_name: "Bootstrap Config Crew"
    mission: "Design and implement an initial bootstrap CLI that creates a minimally valid meta-agents.yaml with low operator friction. In interactive terminals it prompts for required fields and selected optional fields. In non-interactive environments it applies logical defaults or accepts explicit flags. It may also support an AI-assisted bootstrap mode using API key or OAuth."
    sprint_mode:
      name: "v0.4.0-bootstrap-cli-onboarding"
      active: true
      target_release: "v0.4.0"
      objective: "Deliver a first-run bootstrap flow that generates a minimally valid meta-agents.yaml and reduces configuration resistance for new users."
      execution_mode: "spec-bound-slice-driven"
      directives:
        - "spec-bound execution"
        - "onboarding-first UX"
        - "required-fields-first"
        - "interactive and non-interactive parity"
        - "AI-assisted mode optional, never mandatory"
        - "safe defaults over config sprawl"
        - "PR-sized slices"
        - "mandatory validation at each slice"
      must_deliver:
        - "bootstrap command design"
        - "interactive terminal questionnaire"
        - "non-interactive fallback behavior"
        - "minimal required schema generation"
        - "logical defaults for required fields"
        - "AI-assisted bootstrap option design"
        - "API key and/or OAuth input flow contract"
        - "post-generation validate step"
        - "overwrite/merge safety behavior"
        - "docs and examples"
        - "test plan"
      must_not_deliver:
        - "full AI orchestration engine"
        - "remote bootstrap service dependency"
        - "expansion of unrelated runtime features"
        - "schema redesign outside bootstrap needs"
        - "v0.5.0+ onboarding wizard scope"
    source_configs:
      pi: ".pi/crew/bootstrap-config/multi-team.yaml"
      claude: ".claude/crew/bootstrap-config/multi-team.yaml"
      opencode: ".opencode/multi-team.yaml"
      hermes: ".hermes/crew/bootstrap-config/config.yaml"
    session:
      pi_root: ".pi/crew/bootstrap-config/sessions"
      claude_mirror_root: ".claude/crew/bootstrap-config/sessions"
    topology:
      orchestrator: "orchestrator"
      leads:
        product: "product-lead"
        engineering: "engineering-lead"
        validation: "validation-lead"
      workers:
        product: ["ux-researcher", "schema-planner"]
        engineering: ["cli-dev", "runtime-dev"]
        validation: ["qa-reviewer", "docs-reviewer"]
    agents:
      - id: "orchestrator"
        role: "orchestrator"
        team: "orchestration"
        model_ref: "orchestrator_default"
        expertise: "orchestrator-expertise-model"
        skills: ["delegate_bounded", "zero_micromanagement", "expertise_model"]
        domain_profile: "read_only_repo"
        sprint_responsibilities:
          - "control bootstrap scope"
          - "keep focus on low-friction onboarding"
          - "prevent scope expansion into unrelated runtime work"
          - "consolidate final bootstrap contract"
      - id: "product-lead"
        role: "lead"
        team: "product"
        model_ref: "lead_default"
        expertise: "product-lead-expertise-model"
        skills: ["delegate_bounded", "zero_micromanagement", "expertise_model", "bootstrap_config_architect"]
        domain_profile: "planning_delivery"
        sprint_responsibilities:
          - "define onboarding flow"
          - "decide required vs optional prompts"
          - "define AI-assisted UX boundaries"
          - "minimize operator friction"
      - id: "engineering-lead"
        role: "lead"
        team: "engineering"
        model_ref: "lead_default"
        expertise: "engineering-lead-expertise-model"
        skills: ["delegate_bounded", "zero_micromanagement", "expertise_model"]
        domain_profile: "runtime_impl"
        sprint_responsibilities:
          - "coordinate CLI implementation"
          - "preserve config and adapter boundaries"
          - "split bootstrap into implementation slices"
      - id: "validation-lead"
        role: "lead"
        team: "validation"
        model_ref: "lead_default"
        expertise: "validation-lead-expertise-model"
        skills: ["delegate_bounded", "zero_micromanagement", "expertise_model"]
        domain_profile: "validation_runtime"
        sprint_responsibilities:
          - "define validation gates"
          - "ensure generated config is minimally valid"
          - "block unsafe overwrite behavior"
      - id: "ux-researcher"
        role: "worker"
        team: "product"
        model_ref: "worker_default"
        expertise: "ux-researcher-expertise-model"
        skills: ["expertise_model", "bootstrap_config_architect"]
        domain_profile: "planning_delivery"
        sprint_responsibilities:
          - "design first-run questionnaire"
          - "define prompt wording"
          - "reduce decision fatigue"
          - "propose smart defaults"
      - id: "schema-planner"
        role: "worker"
        team: "product"
        model_ref: "worker_default"
        expertise: "schema-planner-expertise-model"
        skills: ["expertise_model", "bootstrap_config_architect"]
        domain_profile: "planning_delivery"
        sprint_responsibilities:
          - "identify minimally required fields"
          - "define generated config skeleton"
          - "map required fields to validation rules"
      - id: "cli-dev"
        role: "worker"
        team: "engineering"
        model_ref: "worker_default"
        expertise: "cli-dev-expertise-model"
        skills: ["expertise_model"]
        domain_profile: "cli_operator_surface"
        sprint_responsibilities:
          - "implement bootstrap command"
          - "implement interactive prompts"
          - "handle non-interactive mode and flags"
          - "improve help and explain surfaces"
      - id: "runtime-dev"
        role: "worker"
        team: "engineering"
        model_ref: "worker_default"
        expertise: "runtime-dev-expertise-model"
        skills: ["expertise_model", "bootstrap_config_architect"]
        domain_profile: "bootstrap_generation"
        sprint_responsibilities:
          - "generate meta-agents.yaml"
          - "integrate with validate:config"
          - "support AI-assisted config completion contract"
          - "add safe merge/overwrite behavior"
      - id: "qa-reviewer"
        role: "worker"
        team: "validation"
        model_ref: "worker_default"
        expertise: "qa-reviewer-expertise-model"
        skills: ["expertise_model"]
        domain_profile: "validation_runtime"
        sprint_responsibilities:
          - "test interactive flow"
          - "test non-interactive flow"
          - "test partial input recovery"
          - "test invalid and overwrite scenarios"
      - id: "docs-reviewer"
        role: "worker"
        team: "validation"
        model_ref: "worker_default"
        expertise: "docs-reviewer-expertise-model"
        skills: ["expertise_model"]
        domain_profile: "docs_authoring"
        sprint_responsibilities:
          - "document bootstrap examples"
          - "document AI-assisted mode"
          - "document defaults and required fields"
          - "document CI/non-interactive usage"
    runtime_overrides:
      opencode:
        permission:
          task:
            allow_delegate:
              orchestrator: ["product-lead", "engineering-lead", "validation-lead"]
              product-lead: ["ux-researcher", "schema-planner"]
              engineering-lead: ["cli-dev", "runtime-dev"]
              validation-lead: ["qa-reviewer", "docs-reviewer"]
      claude:
        ccr:
          team_routes:
            orchestrator: ["product-lead", "engineering-lead", "validation-lead"]
      pi:
        multi_team:
          session_root: ".pi/crew/bootstrap-config/sessions"
          extension_entry: "extensions/multi-team.ts"

  - id: "dev"
    display_name: "Development Crew"
    mission: "Setup and evolve runtime support, validation, projection, and operator-facing architecture for Meta Agents Harness while preserving bounded scope and runtime-agnostic design."
    sprint_mode:
      name: "v0.4.0-runtime-evolution"
      active: true
      target_release: "v0.4.0"
      objective: "Finalize the current runtime support roadmap with bounded adapter and validation improvements."
      execution_mode: "spec-bound-slice-driven"
      directives:
        - "spec-bound execution"
        - "no architecture-wave expansion"
        - "no v0.5.0+ scope"
        - "PR-sized slices"
        - "mandatory validation at each slice"
        - "explicit deferred list for anything outside v0.4.0"
      must_deliver:
        - "Hermes command and capability discovery"
        - "runtime compatibility matrix"
        - "adapter skeleton"
        - "bounded dispatcher and config integration plan"
        - "diagnostics and explainability impact plan"
        - "test plan"
        - "small implementation-ready slices"
      must_not_deliver:
        - "full Hermes parity"
        - "remote execution foundation"
        - "policy engine"
        - "federation/interconnect"
        - "confidential execution"
        - "runtime contract redesign driven by Hermes"
        - "MAH becoming Hermes-shaped"
    source_configs:
      pi: ".pi/crew/dev/multi-team.yaml"
      claude: ".claude/crew/dev/multi-team.yaml"
      opencode: ".opencode/multi-team.yaml"
      hermes: ".hermes/crew/dev/config.yaml"
    session:
