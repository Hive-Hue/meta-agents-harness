        skills: ["expertise_model"]
        domain_profile: "validation_runtime"
        sprint_responsibilities:
          - "review runtime boundary and unsafe coupling"
          - "flag Hermes architecture capture risks"
          - "cut future-wave contamination from the sprint"
    runtime_overrides:
      opencode:
        permission:
          task:
            allow_delegate:
              orchestrator: ["planning-lead", "engineering-lead", "validation-lead"]
              planning-lead: ["repo-analyst", "solution-architect"]
              engineering-lead: ["frontend-dev", "backend-dev"]
