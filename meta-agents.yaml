version: 1
name: "meta-agents-harness"
description: "Unified source-of-truth for crews, roles, skills, expertise, models, domains, and runtime projections."

runtime_detection:
  order:
    - forced
    - marker
    - cli
  forced:
    args:
      - "--runtime=<name>"
      - "--runtime <name>"
      - "-r <name>"
      - "-f <name>"
    env:
      - MAH_RUNTIME
  marker:
    pi: ".pi"
    claude: ".claude"
    opencode: ".opencode"
    hermes: ".hermes"
  cli:
    pi:
      direct_cli: "pi"
      wrapper: "pimh"
    claude:
      direct_cli: "claude"
      wrapper: "ccmh"
    opencode:
      direct_cli: "opencode"
      wrapper: "ocmh"
    hermes:
      direct_cli: "hermes"
      wrapper: "hermesh"

runtimes:
  pi:
    wrapper: "pimh"
    config_root: ".pi"
    extension_root: "extensions"
    config_pattern: ".pi/crew/<crew>/multi-team.yaml"
    default_extensions:
      - "extensions/multi-team.ts"
      - "extensions/agent-session-navigator.ts"
      - "extensions/mcp-bridge.ts"
      - "extensions/theme-cycler.ts"
  claude:
    wrapper: "ccmh"
    config_root: ".claude"
    config_pattern: ".claude/crew/<crew>/multi-team.yaml"
    ccr:
      route_map: ".claude/ccr/route-map.example.json"
      policy: "bounded"
    mcp:
      config: ".mcp.json"
      template: ".mcp.example.json"
  opencode:
    wrapper: "ocmh"
    config_root: ".opencode"
    config_pattern: ".opencode/multi-team.yaml"
    task_policy: "permission.task"
    model_overrides:
      orchestrator_default: "zai/glm-4.7"
      lead_default: "zai/glm-4.7"
      worker_default: "zai/glm-4.7"
  hermes:
    wrapper: "hermesh"
    config_root: ".hermes"
    config_pattern: ".hermes/crew/<crew>/config.yaml"
    capabilities:
      persistent_memory: true
      supports_background_operation: true
      supports_multi_backend_execution: true
      gateway_aware: true

catalog:
  models:
    orchestrator_default: "minimax/minimax-m2.7"
    lead_default: "minimax/minimax-m2.7"
    worker_default: "minimax/minimax-m2.7"
  model_fallbacks:
    orchestrator_default:
      - "nvidia/nemotron-3-super-120b-a12b:free"
      - "zai/glm-5"
      - "zai/glm-4.5-air"
    lead_default:
      - "zai/glm-5"
      - "zai/glm-4.5-air"
    worker_default:
      - "nvidia/nemotron-3-super-120b-a12b:free"
      - "zai/glm-4.7"
      - "zai/glm-4.5-air"
  skills:
    delegate_bounded:
      opencode: ".opencode/skills/delegate-bounded/SKILL.md"
      claude: ".claude/skills/delegate-bounded/SKILL.md"
      pi: ".pi/skills/delegate-bounded/SKILL.md"
      hermes: ".hermes/skills/delegate-bounded/SKILL.md"
    zero_micromanagement:
      opencode: ".opencode/skills/zero-micromanagement/SKILL.md"
      claude: ".claude/skills/zero-micromanagement/SKILL.md"
      pi: ".pi/skills/zero-micromanagement/SKILL.md"
      hermes: ".hermes/skills/zero-micromanagement/SKILL.md"
    expertise_model:
      opencode: ".opencode/skills/expertise-model/SKILL.md"
      claude: ".claude/skills/expertise-model/SKILL.md"
      pi: ".pi/skills/expertise-model/SKILL.md"
      hermes: ".hermes/skills/expertise-model/SKILL.md"
    bootstrap_config_architect:
      opencode: ".opencode/skills/bootstrap-config-architect/SKILL.md"
      claude: ".claude/skills/bootstrap-config-architect/SKILL.md"
      pi: ".pi/skills/bootstrap-config-architect/SKILL.md"
      hermes: ".hermes/skills/bootstrap-config-architect/SKILL.md"

