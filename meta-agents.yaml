crews:
  - id: dev
    display_name: Development Crew
    mission: Deliver bounded v0.6.0 runtime evolution for Meta Agents Harness, centered on cross-runtime headless execution and integrated session interoperability, while preserving runtime-agnostic design and explicit operational contracts.
    sprint_mode:
      name: v0.6.0-headless-and-sessions
      active: true
      target_release: v0.6.0
      objective: "Define and implement two bounded v0.6.0 fronts: headless execution across runtimes and integrated session export/injection interoperability."
      execution_mode: spec-bound-slice-driven
      directives:
        - spec-bound execution
        - no architecture-wave expansion
        - no v0.7.0+ scope
        - PR-sized slices
        - mandatory validation at each slice
        - explicit deferred list for anything outside v0.6.0
      must_deliver:
        - Headless support matrix across runtimes
        - Explicit headless capability and adapter contract
        - Stable MAH headless execution envelope
        - Canonical MAH session export format
        - Bounded context injection between runtimes
        - Session interoperability fidelity model
        - Integration and contract test coverage
      must_not_deliver:
        - full transcript replay portability
        - full multi-runtime parity
        - remote execution foundation
        - policy engine
        - federation/interconnect
        - confidential execution
        - distributed session broker
        - v0.7.0+ scope
    source_configs:
      pi: .pi/crew/dev/multi-team.yaml
      claude: .claude/crew/dev/multi-team.yaml
      codex: .codex/crew/dev/multi-team.yaml
      kilo: .kilo/crew/dev/multi-team.yaml
      opencode: .opencode/multi-team.yaml
      hermes: .hermes/crew/dev/config.yaml
    session:
      pi_root: .pi/crew/dev/sessions
      claude_mirror_root: .claude/crew/dev/sessions
      codex_root: .codex/crew/dev/sessions
      kilo_root: .kilo/crew/dev/sessions
    topology:
      orchestrator: orchestrator
      leads:
        planning: planning-lead
        engineering: engineering-lead
        validation: validation-lead
      workers:
        planning:
          - repo-analyst
          - solution-architect
        engineering:
          - frontend-dev
          - backend-dev
        validation:
          - qa-reviewer
          - security-reviewer
    agents:
      - id: orchestrator
        role: orchestrator
        team: orchestration
        model_ref: orchestrator_default
        expertise: orchestrator-expertise-model
        skills:
          - delegate_bounded
          - zero_micromanagement
          - expertise_model
        domain_profile: read_only_repo
        sprint_responsibilities:
          - control sprint scope
          - distribute slices
          - consolidate decisions
          - prevent runtime-specific capture of MAH architecture
          - defer anything outside v0.6.0
      - id: planning-lead
        role: lead
        team: planning
        model_ref: lead_default
        expertise: planning-lead-expertise-model
        skills:
          - delegate_bounded
          - zero_micromanagement
          - expertise_model
        domain_profile: planning_delivery
        sprint_responsibilities:
          - translate spec into executable backlog
          - order slices
          - prevent backlog inflation
          - separate headless execution work from session interop work
      - id: engineering-lead
        role: lead
        team: engineering
        model_ref: lead_default
        expertise: engineering-lead-expertise-model
        skills:
          - delegate_bounded
          - zero_micromanagement
          - expertise_model
        domain_profile: runtime_impl
        sprint_responsibilities:
          - coordinate implementation
          - split work into reviewable changesets
          - preserve runtime adapter and session adapter boundaries
      - id: validation-lead
        role: lead
        team: validation
        model_ref: lead_default
        expertise: validation-lead-expertise-model
        skills:
          - delegate_bounded
          - zero_micromanagement
          - expertise_model
        domain_profile: validation_runtime
        sprint_responsibilities:
          - define phase gates
          - validate spec adherence
          - block scope escape from the release boundary
          - enforce explicit fidelity and fallback rules
      - id: repo-analyst
        role: worker
        team: planning
        model_ref: worker_default
        expertise: repo-analyst-expertise-model
        skills:
          - expertise_model
        domain_profile: read_only_repo
        sprint_responsibilities:
          - map real codebase integration points
          - locate affected files
          - surface regression and coupling risks
          - identify runtime-specific headless and session semantics
      - id: solution-architect
        role: worker
        team: planning
        model_ref: lead_default
        expertise: solution-architect-expertise-model
        skills:
          - expertise_model
        domain_profile: planning_delivery
        sprint_responsibilities:
          - define the runtime adapter evolution for headless mode
          - define the session adapter and export/injection boundaries
          - identify the smallest technically correct slice
      - id: frontend-dev
        role: worker
        team: engineering
        model_ref: worker_default
        expertise: frontend-dev-expertise-model
        skills:
          - expertise_model
        domain_profile:
          - cli_operator_surface
          - runtime_impl
        sprint_responsibilities:
          - update CLI and help surfaces
          - handle operator-facing explainability and docs changes
          - keep headless and session UX legible and explicit
      - id: backend-dev
        role: worker
        team: engineering
        model_ref: worker_default
        expertise: backend-dev-expertise-model
        skills:
          - expertise_model
        domain_profile:
          - cli_operator_surface
          - runtime_impl
        sprint_responsibilities:
          - implement ruupdntime adapter headless behavior
          - integrate dispatcher and session export/injection changes
          - own runtime and session interoperability tests
      - id: qa-reviewer
        role: worker
        team: validation
        model_ref: worker_default
        expertise: qa-reviewer-expertise-model
        skills:
          - expertise_model
        domain_profile: validation_runtime
        sprint_responsibilities:
          - run smoke tests
          - run diagnostics tests
          - verify sync consistency
          - validate headless and session export/injection flows
      - id: security-reviewer
        role: worker
        team: validation
        model_ref: worker_default
        expertise: security-reviewer-expertise-model
        skills:
          - expertise_model
        domain_profile: validation_runtime
        sprint_responsibilities:
          - review runtime boundary and unsafe coupling
          - flag runtime capture and false portability risks across runtimes
          - cut future-wave contamination from the sprint
    runtime_overrides:
      opencode:
        permission:
          task:
            allow_delegate:
              orchestrator:
                - planning-lead
                - engineering-lead
                - validation-lead
              planning-lead:
                - repo-analyst
                - solution-architect
              engineering-lead:
                - frontend-dev
                - backend-dev
              validation-lead:
                - qa-reviewer
                - security-reviewer
      claude:
        ccr:
          team_routes:
            orchestrator:
              - planning-lead
              - engineering-lead
              - validation-lead
      pi:
        multi_team:
          session_root: .pi/crew/dev/sessions
          extension_entry: extensions/multi-team.ts
  - id: marketing
    display_name: Marketing Crew
    mission: Plan, produce, refine, and validate communication assets, launch narratives, campaign collateral, and supporting media for Meta Agents Harness.
    source_configs:
