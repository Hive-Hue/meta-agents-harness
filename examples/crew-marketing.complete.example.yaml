version: 1
name: "meta-agents-harness"

crews:
  - id: "marketing"
    display_name: "Marketing Crew"
    source_configs:
      pi: ".pi/crew/marketing/multi-team.yaml"
      claude: ".claude/crew/marketing/multi-team.yaml"
      opencode: ".opencode/multi-team.yaml"
    session:
      pi_root: ".pi/crew/marketing/sessions"
      claude_mirror_root: ".claude/crew/marketing/sessions"
    topology:
      orchestrator: "orchestrator"
      leads:
        planning: "planning-lead"
        creative: "creative-lead"
        validation: "validation-lead"
      workers:
        planning: ["market-researcher", "campaign-strategist"]
        creative: ["copywriter", "creative-strategist", "media-operator"]
        validation: ["performance-analyst", "brand-safety-reviewer"]
    agents:
      - id: "orchestrator"
        role: "orchestrator"
        team: "orchestration"
        model_ref: "orchestrator_default"
        expertise: "orchestrator-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "read_only_repo"
      - id: "planning-lead"
        role: "lead"
        team: "planning"
        model_ref: "lead_default"
        expertise: "planning-lead-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "marketing_assets"
      - id: "creative-lead"
        role: "lead"
        team: "creative"
        model_ref: "lead_default"
        expertise: "creative-lead-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "marketing_assets"
      - id: "validation-lead"
        role: "lead"
        team: "validation"
        model_ref: "lead_default"
        expertise: "validation-lead-mental-model"
        skills: ["delegate_bounded", "zero_micromanagement", "mental_model"]
        domain_profile: "marketing_assets"
      - id: "market-researcher"
        role: "worker"
        team: "planning"
        model_ref: "worker_default"
        expertise: "market-researcher-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "campaign-strategist"
        role: "worker"
        team: "planning"
        model_ref: "worker_default"
        expertise: "campaign-strategist-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "copywriter"
        role: "worker"
        team: "creative"
        model_ref: "worker_default"
        expertise: "copywriter-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "creative-strategist"
        role: "worker"
        team: "creative"
        model_ref: "worker_default"
        expertise: "creative-strategist-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "media-operator"
        role: "worker"
        team: "creative"
        model_ref: "worker_default"
        expertise: "media-operator-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "performance-analyst"
        role: "worker"
        team: "validation"
        model_ref: "worker_default"
        expertise: "performance-analyst-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
      - id: "brand-safety-reviewer"
        role: "worker"
        team: "validation"
        model_ref: "worker_default"
        expertise: "brand-safety-reviewer-mental-model"
        skills: ["mental_model"]
        domain_profile: "marketing_assets"
    runtime_overrides:
      opencode:
        permission:
          task:
            allow_delegate:
              orchestrator: ["planning-lead", "creative-lead", "validation-lead"]
              planning-lead: ["market-researcher", "campaign-strategist"]
              creative-lead: ["copywriter", "creative-strategist", "media-operator"]
              validation-lead: ["performance-analyst", "brand-safety-reviewer"]
      claude:
        ccr:
          team_routes:
            orchestrator: ["planning-lead", "creative-lead", "validation-lead"]
      pi:
        multi_team:
          session_root: ".pi/crew/marketing/sessions"
          extension_entry: "extensions/multi-team.ts"
