name: MarketingMultiTeam
session_dir: .claude/crew/marketing/sessions
expertise_dir: .claude/crew/marketing/expertise

orchestrator:
  name: orchestrator
  description: Central coordinator for planning, creative execution, and validation of marketing operations.
  prompt: .claude/crew/marketing/agents/orchestrator.md
  expertise:
    path: .claude/crew/marketing/expertise/orchestrator-mental-model.yaml
    use-when: Capture coordination patterns, prioritization tradeoffs, and routing decisions.
    updatable: true
    max-lines: 10000
  model: openai-codex/gpt-5.2
  tools: [delegate_agent, update_mental_model, mcp_servers, mcp_tools, mcp_call]
  skills:
    - .claude/skills/delegate-bounded/SKILL.md
    - .claude/skills/active-listener/SKILL.md
    - .claude/skills/mental-model/SKILL.md
    - .claude/skills/zero-micromanagement/SKILL.md
    - .claude/skills/web-research/SKILL.md
  domain:
    - path: .
      read: true
      upsert: false
      delete: false

teams:
