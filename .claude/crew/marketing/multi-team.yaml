orchestrator:
  name: orchestrator
  description: Orchestrator coordinator
  instruction_block: crew=marketing | mission=Plan, produce, refine, and validate
    communication assets, launch narratives, campaign collateral, and supporting
    media for Meta Agents Harness.
  prompt: .claude/crew/marketing/agents/orchestrator.md
  expertise:
    path: .claude/crew/marketing/expertise/orchestrator-expertise-model.yaml
    use-when: Track durable learnings for orchestrator.
    updatable: true
    max-lines: 10000
  model: minimax/minimax-m2.7
  model_fallbacks:
    - nvidia/nemotron-3-super-120b-a12b:free
    - zai/glm-5
    - minimax/minimax-m2.7
    - openai/gpt-5.4-mini
