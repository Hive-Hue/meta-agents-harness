        path: .claude/crew/marketing/expertise/planning-lead-mental-model.yaml
        use-when: Store positioning notes, audience hypotheses, and campaign scoping decisions.
        updatable: true
        max-lines: 10000
      model: openai-codex/gpt-5.2
      tools: [delegate_agent, update_mental_model, mcp_servers, mcp_tools, mcp_call]
      skills:
        - .claude/skills/delegate-bounded/SKILL.md
        - .claude/skills/active-listener/SKILL.md
        - .claude/skills/mental-model/SKILL.md
        - .claude/skills/zero-micromanagement/SKILL.md
        - .claude/skills/web-research/SKILL.md
      domain:
        - path: .
          read: true
          upsert: false
          delete: false
    members:
      - name: market-researcher
        description: Researches channels, competitors, and audience evidence.
        prompt: .claude/crew/marketing/agents/market-researcher.md
        expertise:
          path: .claude/crew/marketing/expertise/market-researcher-mental-model.yaml
          use-when: Capture audience insights, competitor patterns, and channel opportunities.
          updatable: true
          max-lines: 10000
        model: zai/glm-5
        tools: [read, grep, find, ls, update_mental_model, mcp_servers, mcp_tools, mcp_call]
        skills:
          - .claude/skills/active-listener/SKILL.md
          - .claude/skills/mental-model/SKILL.md
          - .claude/skills/web-research/SKILL.md
        domain:
          - path: .
            read: true
            upsert: false
            delete: false
          - path: specs/marketing/
            read: true
            upsert: false
            delete: false
      - name: campaign-strategist
        description: Converts discovery into campaign architecture and sequencing.
        prompt: .claude/crew/marketing/agents/campaign-strategist.md
        expertise:
          path: .claude/crew/marketing/expertise/campaign-strategist-mental-model.yaml
