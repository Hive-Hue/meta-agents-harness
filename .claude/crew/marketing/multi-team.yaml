    - skills/delegate_bounded/SKILL.md
    - skills/zero_micromanagement/SKILL.md
    - skills/expertise_model/SKILL.md
  routes_to:
    - planning-lead
    - creative-lead
    - validation-lead
  domain:
    - path: .
      read: true
      upsert: false
      delete: false
