crews:
  - id: dev
    display_name: Development Crew
    mission: Deliver bounded v0.8.0 Context Memory evolution for Meta Agents Harness, adding operational context retrieval and persistent memory primitives while preserving expertise-first routing and runtime-agnostic contracts.
    sprint_mode:
      name: v0.8.0-context-memory
      active: true
      target_release: v0.8.0
      objective: "Define and implement bounded v0.8.0 Context Memory foundations: operational context schema, corpus/index lifecycle, bounded retrieval, runtime injection, and proposal flow for persistent operational memory."
      execution_mode: spec-bound-milestone-driven
      directives:
        - spec-bound execution
        - expertise remains source-of-truth for routing
        - bounded retrieval and prompt budgets
        - no mandatory vector store or obsidian dependency
        - conservative rollout with explicit fallback
        - PR-sized slices
        - mandatory validation at each slice
        - explicit deferred list for anything outside v0.8.0
      must_deliver:
        - Context Memory schema and validation for .md and .qmd sources
        - Canonical context corpus, index, and retrieval contracts
        - Explainable retrieval output by agent, capability, and task
        - Optional runtime bootstrap injection with bounded context payloads
        - Proposal flow from sessions and provenance into curated context memory
        - Operator-facing mah context CLI surfaces
        - Integration, contract, and non-regression coverage
      must_not_deliver:
        - context memory as routing authority
        - automatic memory promotion from raw transcripts without review
        - mandatory vector database or obsidian dependency
        - unrestricted vault scanning or prompt inflation
        - runtime-locked memory behavior
        - v0.9.0+ scope
    source_configs:
      pi: .pi/crew/dev/multi-team.yaml
      claude: .claude/crew/dev/multi-team.yaml
      codex: .codex/crew/dev/multi-team.yaml
      kilo: .kilo/crew/dev/multi-team.yaml
      opencode: .opencode/multi-team.yaml
      openclaude: .openclaude/crew/dev/multi-team.yaml
      hermes: .hermes/crew/dev/config.yaml
    session:
      pi_root: .pi/crew/dev/sessions
      claude_mirror_root: .claude/crew/dev/sessions
      codex_root: .codex/crew/dev/sessions
      kilo_root: .kilo/crew/dev/sessions
      openclaude_root: .openclaude/crew/dev/sessions
    topology:
      orchestrator: orchestrator
      leads:
        planning: planning-lead
        engineering: engineering-lead
        validation: validation-lead
      workers:
        planning:
          - repo-analyst
          - solution-architect
        engineering:
          - frontend-dev
          - backend-dev
        validation:
          - qa-reviewer
          - security-reviewer
    agents:
      - id: orchestrator
        role: orchestrator
        team: orchestration
        model_ref: orchestrator_default
        expertise: orchestrator-expertise-model
        skills:
          - delegate_bounded
          - zero_micromanagement
          - expertise_model
          - caveman
          - caveman-crew
          - caveman-commit
          - caveman-compress
          - caveman-help
          - caveman-review
        domain_profile: read_only_repo
        sprint_responsibilities:
          - control v0.8.0 scope
          - sequence foundation, retrieval, and runtime slices
          - enforce expertise/context boundary and fallback-safe decisions
          - preserve runtime-agnostic MAH architecture
          - defer broader assistant-layer ambitions outside v0.8.0
      - id: planning-lead
        role: lead
        team: planning
        model_ref: lead_default
        expertise: planning-lead-expertise-model
        skills:
          - delegate_bounded
          - zero_micromanagement
          - expertise_model
          - caveman
          - caveman-crew
          - caveman-commit
          - caveman-compress
          - caveman-help
          - caveman-review
        domain_profile: planning_delivery
        sprint_responsibilities:
          - translate Context Memory plan into executable backlog
          - maintain milestone ordering and acceptance criteria
          - keep routing, memory, session, and provenance boundaries explicit
          - prevent scope creep into autonomous knowledge systems
      - id: engineering-lead
        role: lead
        team: engineering
        model_ref: lead_default
        expertise: engineering-lead-expertise-model
        skills:
          - delegate_bounded
          - zero_micromanagement
          - expertise_model
          - caveman
          - caveman-crew
          - caveman-commit
          - caveman-compress
          - caveman-help
          - caveman-review
        domain_profile: runtime_impl
        sprint_responsibilities:
          - coordinate schema, index, retrieval, and runtime integration streams
          - split work into reviewable changesets
          - preserve adapter boundaries and backward compatibility
      - id: validation-lead
        role: lead
        team: validation
        model_ref: lead_default
        expertise: validation-lead-expertise-model
        skills:
          - delegate_bounded
          - zero_micromanagement
          - expertise_model
          - caveman
          - caveman-crew
          - caveman-commit
          - caveman-compress
          - caveman-help
          - caveman-review
        domain_profile: validation_runtime
        sprint_responsibilities:
          - define quality gates for schema, retrieval, and bootstrap injection
          - validate explainability, boundedness, and release boundary
          - enforce JSON contract stability for context surfaces
          - block policy, path, and memory-persistence bypass risk
      - id: repo-analyst
        role: worker
        team: planning
        model_ref: worker_default
        expertise: repo-analyst-expertise-model
        skills:
          - expertise_model
          - caveman
          - caveman-crew
          - caveman-compress
          - caveman-help
          - caveman-review
        domain_profile: read_only_repo
        sprint_responsibilities:
          - map real codebase integration points for Context Memory
          - locate affected files and dependency edges
          - surface regression and coupling risks
          - identify runtime and plugin compatibility constraints
      - id: solution-architect
        role: worker
        team: planning
        model_ref: lead_default
        expertise: solution-architect-expertise-model
        skills:
          - expertise_model
          - caveman
          - caveman-crew
          - caveman-compress
          - caveman-help
          - caveman-review
        domain_profile: planning_delivery
        sprint_responsibilities:
          - define context memory document, index, and retrieval contracts
          - define bootstrap injection and explain payload semantics
          - define proposal governance and persistence envelope
      - id: frontend-dev
        role: worker
        team: engineering
        model_ref: worker_default
        expertise: frontend-dev-expertise-model
        skills:
          - expertise_model
          - caveman
          - caveman-crew
          - caveman-commit
          - caveman-compress
          - caveman-help
          - caveman-review
        domain_profile:
          - cli_operator_surface
          - runtime_impl
        sprint_responsibilities:
          - implement context CLI and help surfaces
          - improve operator-facing retrieval and proposal explainability outputs
          - keep UX legible for bounded context and bootstrap flows
      - id: backend-dev
        role: worker
        team: engineering
        model_ref: worker_default
        expertise: backend-dev-expertise-model
        skills:
          - expertise_model
          - caveman
          - caveman-crew
          - caveman-commit
          - caveman-compress
          - caveman-help
          - caveman-review
        domain_profile:
          - cli_operator_surface
          - runtime_impl
        sprint_responsibilities:
          - implement context corpus, index, and retrieval pipeline
          - integrate bootstrap injection and proposal flow with runtime surfaces
          - own core context interoperability and persistence tests
      - id: qa-reviewer
        role: worker
        team: validation
        model_ref: qa_default
        expertise: qa-reviewer-expertise-model
        skills:
          - expertise_model
          - caveman
          - caveman-crew
          - caveman-compress
          - caveman-help
          - caveman-review
        domain_profile: validation_runtime
        sprint_responsibilities:
          - run context unit, integration, and contract tests
          - run diagnostics and regression suites
          - verify sync consistency and output contracts
          - validate retrieval, bootstrap, and proposal explain flows
      - id: security-reviewer
        role: worker
        team: validation
        model_ref: qa_default
        expertise: security-reviewer-expertise-model
        skills:
          - expertise_model
          - caveman
          - caveman-crew
          - caveman-compress
          - caveman-help
          - caveman-review
        domain_profile: validation_runtime
        sprint_responsibilities:
          - review path traversal, prompt inflation, and memory poisoning risks
          - flag policy bypass via context injection and persistence
          - validate bounded storage and confidential memory constraints
    runtime_overrides:
      opencode:
        permission:
          task:
            allow_delegate:
              orchestrator:
                - planning-lead
                - engineering-lead
                - validation-lead
              planning-lead:
